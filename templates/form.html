{% load static %}

    <link rel="stylesheet" href="{% static 'style/form.css' %}">
<head><body>
    

   <div class="form-container">
    <h2>Add a Book</h2>

    <form id="book-form" action="" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            <label for="books_name">Book Name</label>
            <input type="text" id="books_name" name="books_name" 
              placeholder="Enter book name">
        </div>

        <div class="form-group">
            <label for="books_title">Book Title</label>
            <input type="text" id="books_title" name="books_title"  placeholder="Enter book title">
        </div>
        
        <div class="form-group">
            <label for="books_author">Author</label>
            <input type="text" id="books_author" name="books_author" placeholder="Enter author name">
        </div>
        <div class="form-group">
            <label for="books_description">Description</label>
            <textarea id="books_description" name="books_description" rows="5" placeholder="Enter description"></textarea>
        </div>


        <div class="form-group">
            <label for="media">Upload Image</label>
            <input type="file" id="media" name="media" accept="image/*">
        </div>

        <div class="form-group">
            <button type="submit" class="btn">Submit</button>
        </div>
    </form>
</div>


</body>
</html>
