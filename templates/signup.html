
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'style/signup.css' %}">
</head>
<body>
    


    <center>
  <div class="form-container">
    <h2>Create Account</h2>
    
    <form action="" method="post">
        <p>{{c}}</p>
        {% csrf_token %}
      <div class="form-group">
        <input type="text" name="name"  placeholder="" />
        <label for="name">Full Name</label>
      </div>
      <div class="form-group">
        <input type="email" name="email"  placeholder="" />
        <label for="email">Email Address</label>
      </div>
      <div class="form-group">
        <input type="pass1" id="pass1" name="pass1"  placeholder="" />
        <label for="password">Password</label>
      </div>
       <div class="form-group">
        <input type="pass2" id="pass2" name="pass2"  placeholder="confirm_password " />
        <label for="password"></label>
      </div>
      <button type="submit" class="submit-btn">Sign Up</button><br><br>
      <p style="color: #fff;"> you already account:<a href="{% url 'login' %}" style="color: pink;" > Login</a></p>
    </form>
  </div></center>
</body>
</html>
