{% load static %}

    <link rel="stylesheet" href="{% static 'style/book_issue.css' %}">
   

    <!-- Book Issues Table -->
    <section class="book-issues">
        <h2>Issued Books</h2>
          <form class="search-container" method="post" action="">
            {% csrf_token %}
                <input type="text" name="search" placeholder="Search by name or book name..." value="{{ query|default:'' }}">
                <button type="submit">Search</button>
                </form><br><br>
        <div class="book-issues-table">

            <table>
               
                <thead>
                
                    <tr>
                        <th>so:no</th>
                        <th>Name</th>
                        <th>Book Name</th>
                        <th>Phone Number</th>
                        <th>Issue Time</th>
                    </tr>
                </thead>
                <tbody>
                    {% for i in issue %}
                    <tr>
                        <td>{{ i.id}}</td>
                        <td>{{ i.name|default:"N/A" }}</td>
                        <td>{{ i.books_name|default:"N/A" }}</td>
                        <td>{{ i.phon_no }}</td>
                        <td>{{ i.issue_time|date:"Y-m-d H:i" }}</td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="4">No books issued yet.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </section>
